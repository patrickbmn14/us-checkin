  .opt{

    position:relative; transition:border-color .15s, background .15s; line-height:1.4;
  }
  .opt::before{
    content:''; position:absolute; left:13px; top:14px;

  .opt.sel{background:var(--accent-soft); border-color:var(--accent); border-left-color:var(--accent); color:var(--accent);}

  .nav{display:flex; justify-content:space-between; align-items:center; margin-top:22px;}
  .ghost{
    font-family:'Courier New',monospace; font-size:13px; background:none; border:none; cursor:pointer;
    color:var(--muted); padding:8px 4px; text-transform:uppercase; letter-spacing:.06em;
  }
  .ghost:hover{color:var(--ink);}
  .ghost:disabled{opacity:.3; cursor:default;}
  .next{
    font-family:'Courier New',monospace; font-size:13px; text-transform:uppercase; letter-spacing:.06em;
    padding:11px 24px; cursor:pointer; border:1px solid var(--ink); background:var(--ink); color:var(--paper);

  .start h2,.end h2{font-size:24px; font-weight:normal; margin-bottom:8px;}
  .start p,.end p{color:var(--muted); font-size:15px; margin-bottom:18px; line-height:1.6; text-align:left;}

  .btn{

  .btn.alt{background:none; color:var(--ink);}
  .btn.alt:hover{color:var(--accent); border-color:var(--accent); background:none;}

  .warn{font-size:12px; color:var(--accent); margin-top:14px;}
  footer{margin-top:36px; text-align:center; font-size:11px; color:var(--muted);}
  #printReport{display:none;}

  @media print{
    .app{display:none;}

    #printReport .pq .t{font-style:italic;}
    #printReport .pq .a{padding-left:14pt;}
  }
</style>
</head>

[9,"Anything else you want {P} to know?",["I am happy with us","I am hopeful about us","I am worried, but all in","I need a little patience right now","I need more - let us talk soon","Thank you for doing this with me","I would rather write it"]]
];

let started=false, idx=0, userName='', partnerName='';
const sel=QS.map(()=>new Set());
const own=QS.map(()=>'');
const stage=document.getElementById('stage');
const prog=document.getElementById('prog');
const counter=document.getElementById('counter');
const pad=n=>String(n).padStart(2,'0');
const esc=t=>t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sub=t=>t.split('{P}').join(partnerName);

function renderStart(){
  counter.textContent='START';
  prog.style.width='0%';
  stage.innerHTML=
    '<div class="start">'+
      '<h2>Us — a 100-question check-in</h2>'+
      '<p>How were the last 2-3 months for you two, and what do you wish for the next 2-3? Answer alone and honestly, without checking what the other picked. You can select several answers per question — and answer 8 is always a box for your own words, which is often where the real stuff lives. At the end you get a PDF report. Then swap reports — or hand both to Claude.</p>'+
      '<p style="text-align:center;"><input id="uname" placeholder="Your name" maxlength="30"><br>'+
      '<input id="pname" placeholder="Your partner&#39;s name" maxlength="30"></p>'+
      '<button class="next" id="go">Begin &rarr;</button>'+
      '<div class="warn" id="startwarn">Do not close or reload this page while answering — progress is not saved.</div>'+
    '</div>';
  document.getElementById('go').onclick=()=>{
    userName=document.getElementById('uname').value.trim();
    partnerName=document.getElementById('pname').value.trim();
    if(!userName||!partnerName){
      document.getElementById('startwarn').textContent='Please enter both names — the questions are built around them.';
      return;
    }
    started=true;idx=0;render();
  };
}

function render(){
  if(!started)return renderStart();
  if(idx>=QS.length)return renderEnd();
  const[s,q,opts]=QS[idx];
  counter.textContent='Q '+pad(idx+1)+' / '+QS.length;
  prog.style.width=Math.round((idx/QS.length)*100)+'%';
  stage.innerHTML=
    '<span class="cat mono">'+SECTIONS[s]+'</span>'+
    '<div class="hint">Pick everything that is true. Honesty beats harmony here.</div>'+
    '<p class="q">'+esc(sub(q))+'</p>'+
    '<div class="opts">'+opts.map((o,i)=>
      '<button class="opt'+(sel[idx].has(i)?' sel':'')+'" data-i="'+i+'">'+esc(sub(o))+'</button>'
    ).join('')+
    '<div class="own"><label>8 · Own answer</label><input id="ownin" maxlength="200" placeholder="In your own words..." value="'+esc(own[idx]).replace(/"/g,'&quot;')+'"></div>'+
    '</div>'+
    '<div class="nav">'+
      '<button class="ghost" id="back"'+(idx===0?' disabled':'')+'>&larr; Back</button>'+
      '<div>'+
        '<button class="ghost" id="skip" style="margin-right:12px;">Skip</button>'+
        '<button class="next" id="next">Next &rarr;</button>'+
      '</div>'+
    '</div>';
  stage.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.i;
    if(sel[idx].has(i)){sel[idx].delete(i);b.classList.remove('sel');}
    else{sel[idx].add(i);b.classList.add('sel');}
  });
  const saveOwn=()=>{own[idx]=document.getElementById('ownin').value.trim();};
  document.getElementById('ownin').addEventListener('input',saveOwn);
  const bk=document.getElementById('back');
  if(!bk.disabled)bk.onclick=()=>{saveOwn();idx--;render();};
  document.getElementById('skip').onclick=()=>{sel[idx].clear();own[idx]='';idx++;render();};
  document.getElementById('next').onclick=()=>{saveOwn();idx++;render();};
}

function answerText(i){
  const parts=[...sel[i]].sort((a,b)=>a-b).map(j=>sub(QS[i][2][j]));
  if(own[i])parts.push('Own answer: '+own[i]);
  return parts.length?parts.join(' / '):'(skipped)';
}

function buildTextReport(){
  const d=new Date();
  let r='US - CHECK-IN REPORT\n';
  r+='Answered by: '+userName+'  ·  About: '+userName+' & '+partnerName+'  ·  Date: '+d.toLocaleDateString('en-GB')+'\n';
  r+='='.repeat(50)+'\n';
  let s=-1;
  QS.forEach((q,i)=>{
    if(q[0]!==s){s=q[0];r+='\n['+SECTIONS[s].toUpperCase()+']\n';}
    r+=(i+1)+'. '+sub(q[1])+'\n   -> '+answerText(i)+'\n';
  });
  r+='\n'+'='.repeat(50)+'\nNext step: swap reports with '+partnerName+' - or give both reports to Claude and ask where your wishes match, where they miss each other, and what each of you and both of you together should work on.';
  return r;
}

function buildPrintReport(){
  const d=new Date();
  let h='<h1>Us — check-in report</h1><div class="meta">Answered by '+esc(userName)+' · about '+esc(userName)+' &amp; '+esc(partnerName)+' · '+d.toLocaleDateString('en-GB')+' · the last 2-3 months &amp; the next 2-3</div>';
  let s=-1;
  QS.forEach((q,i)=>{
    if(q[0]!==s){s=q[0];h+='<h2>'+esc(SECTIONS[s])+'</h2>';}
    h+='<div class="pq"><div class="t">'+(i+1)+'. '+esc(sub(q[1]))+'</div><div class="a">→ '+esc(answerText(i))+'</div></div>';
  });
  document.getElementById('printReport').innerHTML=h;
}

function renderEnd(){
  const done=QS.filter((q,i)=>sel[i].size>0||own[i]).length;
  counter.textContent='DONE';
  prog.style.width='100%';
  stage.innerHTML=
    '<div class="end">'+
      '<h2>Done, '+esc(userName)+'.</h2>'+
      '<p style="text-align:center;">'+done+' of '+QS.length+' questions answered. Download your report as a PDF (choose -Save as PDF- in the print dialog) or copy it as text. Then: swap with '+esc(partnerName)+'.</p>'+
      '<div class="actions">'+
        '<button class="btn" id="pdf">Download PDF report</button>'+
        '<button class="btn alt" id="copy">Copy as text</button>'+
        '<button class="btn alt" id="restart">Start over</button>'+
      '</div>'+
      '<div id="copied"></div>'+
    '</div>';
  document.getElementById('pdf').onclick=()=>{buildPrintReport();window.print();};
  document.getElementById('copy').onclick=()=>{
    const t=buildTextReport();
    const done2=()=>{document.getElementById('copied').textContent='✓ Copied — paste it into the chat';};
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(done2).catch(()=>{
        const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();done2();
      });
    }else{
      const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();done2();
    }
  };
  document.getElementById('restart').onclick=()=>{
    idx=0;sel.forEach(s=>s.clear());own.fill('');started=false;render();
  };
}

render();
</script>
</body>
</html>
